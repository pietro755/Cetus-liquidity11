services:
  - type: worker
    name: cetus-rebalance-bot
    runtime: node
    plan: free

    buildCommand: npm install
    startCommand: npm run dev

    envVars:
      - key: NETWORK
        sync: false
      - key: SUI_RPC_URL
        sync: false
      - key: PRIVATE_KEY
        sync: false
      - key: POOL_ADDRESS
        sync: false
      - key: CHECK_INTERVAL
        value: "60"
      - key: LOWER_TICK
        sync: false
      - key: UPPER_TICK
        sync: false
      - key: RANGE_WIDTH
        sync: false
      - key: TOTAL_USD
        sync: false
      - key: MAX_SLIPPAGE
        value: "0.01"
      - key: GAS_BUDGET
        value: "50000000"
      - key: LOG_LEVEL
        value: "info"
      - key: VERBOSE_LOGS
        value: "false"
      - key: DRY_RUN
        value: "false"
